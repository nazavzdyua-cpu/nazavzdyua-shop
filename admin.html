<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAZAVZDY.UA — Адмінка</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="page-hero admin-hero">
  <p class="brand-small">NAZAVZDY.UA</p>
  <h1>Кабінет замовлень</h1>
  <p>Перегляд замовлень, файлів клієнтів та зміна статусів.</p>
</section>

<section class="section admin-section">

  <div class="admin-login-card" id="loginBox">
    <h2>Вхід в акаунт</h2>
    <p>Введіть пароль адміністратора</p>

    <input
      type="password"
      id="adminPassword"
      placeholder="Пароль">

    <button class="admin-main-btn" onclick="loginAdmin()">
      Увійти
    </button>
  </div>

  <div id="ordersBox" style="display:none;">

    <div class="admin-toolbar">
      <div>
        <h2>Замовлення</h2>
        <p>Всі заявки з сайту</p>
      </div>

      <button class="admin-main-btn small" onclick="loadOrders()">
        Оновити
      </button>
    </div>

    <div class="admin-filters">
      <input
        type="text"
        id="orderSearch"
        placeholder="Пошук за номером, імʼям або телефоном"
        oninput="renderOrders()">

      <select id="statusFilter" onchange="renderOrders()">
        <option value="all">Всі статуси</option>
        <option value="Нове">Нове</option>
        <option value="В роботі">В роботі</option>
        <option value="Готове">Готове</option>
        <option value="Відправлено">Відправлено</option>
      </select>
    </div>

    <div class="admin-stats" id="adminStats"></div>

    <div id="ordersList"></div>

  </div>

</section>

<script src="admin.js"></script>

</body>
</html>
